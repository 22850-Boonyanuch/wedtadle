
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบเก็บข้อมูลแบบตาราง</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 40px;
            color: #333;
        }
        .container {
            max-width: 950px; /* ขยายขนาดหน้าต่างให้รองรับข้อมูลที่เพิ่มขึ้น */
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 { text-align: center; color: #4A90E2; }
        
        /* สไตล์ฟอร์ม */
        .form-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap; /* รองรับการแสดงผลบนมือถือ */
        }
        input {
            flex: 1;
            min-width: 150px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }
        /* กำหนดขนาดช่องอายุให้แคบลงหน่อย */
        #ageInput {
            flex: 0 0 80px; 
        }
        button {
            padding: 10px 20px;
            background-color: #4A90E2;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover { background-color: #357ABD; }

        /* สไตล์ตาราง */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #f8f9fa;
            color: #555;
        }
        tr:hover { background-color: #f1f1f1; }
        .delete-btn {
            background-color: #e74c3c;
            padding: 5px 10px;
            font-size: 14px;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .delete-btn:hover { background-color: #c0392b; }
    </style>
</head>
<body>

<div class="container">
    <h2>📊 ระบบบันทึกข้อมูลตาราง</h2>
    
    <div class="form-group">
        <input type="text" id="nameInput" placeholder="ชื่อ-นามสกุล">
        <input type="number" id="ageInput" placeholder="อายุ" min="0">
        <input type="email" id="emailInput" placeholder="อีเมล">
        <input type="text" id="roleInput" placeholder="ตำแหน่ง / บทบาท">
        <button onclick="addData()">เพิ่มข้อมูล</button>
    </div>

    <table id="dataTable">
        <thead>
            <tr>
                <th>ชื่อ-นามสกุล</th>
                <th>อายุ</th>
                <th>อีเมล</th>
                <th>ตำแหน่ง / บทบาท</th>
                <th>จัดการ</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>
</div>

<script>
    function addData() {
        // ดึงค่าจาก Input ทั้งหมด
        const nameInput = document.getElementById('nameInput');
        const ageInput = document.getElementById('ageInput');
        const emailInput = document.getElementById('emailInput');
        const roleInput = document.getElementById('roleInput');
        const tableBody = document.getElementById('dataTable').getElementsByTagName('tbody')[0];

        // ตรวจสอบว่ากรอกข้อมูลครบทุกช่องไหม
        if (!nameInput.value.trim() || !ageInput.value.trim() || !emailInput.value.trim() || !roleInput.value.trim()) {
            alert('กรุณากรอกข้อมูลให้ครบถ้วนทุกช่องครับ');
            return;
        }

        // สร้างแถวใหม่ (Row)
        const newRow = tableBody.insertRow();

        // สร้างเซลล์ข้อมูลทั้งหมด 5 เซลล์ (รวมปุ่มลบ)
        const cell1 = newRow.insertCell(0);
        const cell2 = newRow.insertCell(1);
        const cell3 = newRow.insertCell(2);
        const cell4 = newRow.insertCell(3);
        const cell5 = newRow.insertCell(4);

        // ใส่ค่าลงในแต่ละเซลล์
        cell1.textContent = nameInput.value;
        cell2.textContent = ageInput.value;
        cell3.textContent = emailInput.value;
        cell4.textContent = roleInput.value;
        
        // สร้างปุ่มลบข้อมูล
        const deleteBtn = document.createElement('button');
        deleteBtn.textContent = 'ลบ';
        deleteBtn.className = 'delete-btn';
        deleteBtn.onclick = function() {
            tableBody.deleteRow(newRow.rowIndex - 1);
        };
        cell5.appendChild(deleteBtn);

        // เคลียร์ค่าในช่อง Input ทั้งหมดหลังจากเพิ่มเสร็จ
        nameInput.value = '';
        ageInput.value = '';
        emailInput.value = '';
        roleInput.value = '';
    }
</script>

</body>
</html>
